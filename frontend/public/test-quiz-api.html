<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Quiz API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .result { margin: 10px 0; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Quiz API Test</h1>
        <p>Test the exact same API call that the frontend is making</p>

        <div>
            <h3>Current Authentication Status:</h3>
            <div id="auth-status"></div>
            <button onclick="checkAuth()">Check Auth</button>
            <button onclick="setTestToken()">Set Test Token</button>
        </div>

        <div>
            <h3>Quiz API Test:</h3>
            <div id="api-result"></div>
            <button onclick="testQuizAPI()">Test Quiz API</button>
            <button onclick="testWithRealToken()">Test with Real Token</button>
        </div>

        <div>
            <h3>Backend Server Test:</h3>
            <div id="server-result"></div>
            <button onclick="testBackend()">Test Backend</button>
        </div>
    </div>

    <script>
        function checkAuth() {
            const token = sessionStorage.getItem('token');
            const user = sessionStorage.getItem('user');
            const resultDiv = document.getElementById('auth-status');
            
            let html = '<div class="result info">';
            html += `<strong>Token:</strong> ${token ? 'Present (' + token.substring(0, 20) + '...)' : 'Missing'}<br>`;
            html += `<strong>User:</strong> ${user ? 'Present' : 'Missing'}<br>`;
            
            if (user) {
                try {
                    const userData = JSON.parse(user);
                    html += `<strong>Username:</strong> ${userData.username || 'Unknown'}<br>`;
                    html += `<strong>Role:</strong> ${userData.role || 'Unknown'}<br>`;
                    html += `<strong>User ID:</strong> ${userData.id || 'Unknown'}`;
                } catch (e) {
                    html += `<strong>User Data Error:</strong> ${e.message}`;
                }
            }
            html += '</div>';
            resultDiv.innerHTML = html;
        }

        function setTestToken() {
            // Set a test token for testing
            const testToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjQsInVzZXJuYW1lIjoic3R1ZGVudDEiLCJyb2xlIjoic3R1ZGVudCIsImlhdCI6MTczMzYzNzYwMSwiZXhwIjoxNzMzNzI0MDAxfQ.test';
            const testUser = JSON.stringify({
                id: 4,
                username: 'student1',
                role: 'student'
            });
            
            sessionStorage.setItem('token', testToken);
            sessionStorage.setItem('user', testUser);
            
            document.getElementById('auth-status').innerHTML = '<div class="result success">✅ Test token and user data set!</div>';
        }

        async function testQuizAPI() {
            const resultDiv = document.getElementById('api-result');
            const token = sessionStorage.getItem('token');
            
            if (!token) {
                resultDiv.innerHTML = '<div class="result error">❌ No token found. Click "Set Test Token" first.</div>';
                return;
            }

            try {
                console.log('🧪 Testing quiz API with token:', token.substring(0, 20) + '...');
                
                const response = await fetch('/api/assignments/quiz/1/take', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                console.log('📊 Response status:', response.status);
                console.log('📊 Response headers:', response.headers);

                const responseText = await response.text();
                console.log('📊 Response body:', responseText);

                let html = `<div class="result ${response.ok ? 'success' : 'error'}">`;
                html += `<strong>Status:</strong> ${response.status} ${response.statusText}<br>`;
                html += `<strong>Response:</strong><br>`;
                html += `<pre>${responseText}</pre>`;
                html += '</div>';

                resultDiv.innerHTML = html;

            } catch (error) {
                console.error('❌ API test error:', error);
                resultDiv.innerHTML = `<div class="result error">❌ Request failed: ${error.message}</div>`;
            }
        }

        async function testWithRealToken() {
            // First try to login to get a real token
            const resultDiv = document.getElementById('api-result');
            
            try {
                console.log('🔐 Attempting to get real token...');
                
                const loginResponse = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'student1',
                        password: 'password123'
                    })
                });

                if (loginResponse.ok) {
                    const loginData = await loginResponse.json();
                    console.log('✅ Login successful:', loginData);
                    
                    // Store the real token
                    sessionStorage.setItem('token', loginData.token);
                    sessionStorage.setItem('user', JSON.stringify(loginData.user));
                    
                    // Now test the quiz API
                    await testQuizAPI();
                } else {
                    const errorText = await loginResponse.text();
                    resultDiv.innerHTML = `<div class="result error">❌ Login failed: ${errorText}</div>`;
                }

            } catch (error) {
                console.error('❌ Login error:', error);
                resultDiv.innerHTML = `<div class="result error">❌ Login request failed: ${error.message}</div>`;
            }
        }

        async function testBackend() {
            const resultDiv = document.getElementById('server-result');
            
            try {
                const response = await fetch('/api/assignments/quiz/test');
                const data = await response.text();
                
                resultDiv.innerHTML = `<div class="result ${response.ok ? 'success' : 'error'}">
                    <strong>Backend Status:</strong> ${response.status}<br>
                    <strong>Response:</strong> ${data}
                </div>`;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ Backend connection failed: ${error.message}</div>`;
            }
        }

        // Auto-run on page load
        window.onload = function() {
            checkAuth();
            testBackend();
        };
    </script>
</body>
</html>
